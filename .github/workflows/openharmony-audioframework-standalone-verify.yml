name: OpenHarmony AudioFramework Standalone Verify

on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: "Run mode: normal build or cache-only refresh"
        required: true
        type: choice
        default: build
        options:
          - build
          - refresh-cache
      source_repo:
        description: "AudioFramework git repo URL"
        required: true
        default: "https://gitcode.com/openharmony/multimedia_audio_framework.git"
      base_ref:
        description: "Base branch/tag/commit to start from"
        required: true
        default: "master"
      pr_commit:
        description: "PR commit SHA to validate (optional, build mode only)"
        required: false
        default: ""
      build_command:
        description: "Standalone build command"
        required: true
        default: "bash build/prebuilts_config.sh && hb build audio_framework -i"
  schedule:
    - cron: "20 18 * * *" # 02:20 UTC+8 daily

jobs:
  standalone-build:
    runs-on: ubuntu-22.04
    env:
      RUN_MODE: ${{ github.event_name == 'schedule' && 'refresh-cache' || github.event.inputs.run_mode || 'build' }}
      SOURCE_REPO: ${{ github.event.inputs.source_repo || 'https://gitcode.com/openharmony/multimedia_audio_framework.git' }}
      BASE_REF: ${{ github.event.inputs.base_ref || 'master' }}
      PR_COMMIT: ${{ github.event.inputs.pr_commit || '' }}
      BUILD_COMMAND: ${{ github.event.inputs.build_command || 'bash build/prebuilts_config.sh && hb build audio_framework -i' }}

    steps:
      - name: Checkout workflow repository
        uses: actions/checkout@v4

      - name: Resolve cache key suffix
        run: |
          echo "CACHE_DATE=$(date -u +%Y%m%d)" >> "$GITHUB_ENV"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git python3 python3-pip cmake ninja-build

      - name: Clone audioframework source
        run: |
          git clone "$SOURCE_REPO" audioframework
          cd audioframework
          git fetch --all --tags
          git checkout "$BASE_REF"
          echo "Checked out base ref: $(git rev-parse HEAD)"

      - name: Apply PR commit (if provided)
        if: ${{ env.RUN_MODE == 'build' && env.PR_COMMIT != '' }}
        run: |
          cd audioframework
          git fetch --all --tags
          git cherry-pick "$PR_COMMIT"
          echo "Applied PR commit: $(git rev-parse HEAD)"

      - name: Prepare standalone build tools
        run: |
          git clone https://gitcode.com/openharmony/build.git audioframework/build
          python3 -m pip install --user ./audioframework/build/hb
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"


      - name: Normalize vendor_hihope source (raw.gitcode -> GitHub)
        run: |
          python3 - <<'PY2'
          import json
          from pathlib import Path

          cfg = Path('audioframework/build/indep_configs/config/product_component_url_config.json')
          data = json.loads(cfg.read_text())

          def normalize(url: str) -> str:
              target_prefix = 'https://raw.gitcode.com/openharmony/vendor_hihope/raw/'
              if not url.startswith(target_prefix):
                  return url

              # https://raw.gitcode.com/openharmony/vendor_hihope/raw/<branch>/<path>
              tail = url[len(target_prefix):]
              parts = tail.split('/', 1)
              if len(parts) != 2:
                  return url

              branch, path = parts
              return f'https://raw.githubusercontent.com/openharmony/vendor_hihope/{branch}/{path}'

          updated = {k: [normalize(u) for u in v] for k, v in data.items()}
          cfg.write_text(json.dumps(updated, ensure_ascii=False, indent=2) + '\n')
          print(f'Normalized product component URL config: {cfg}')
          PY2

      - name: Restore prebuild cache (build mode only)
        if: ${{ env.RUN_MODE == 'build' }}
        uses: actions/cache/restore@v4
        with:
          path: |
            audioframework/prebuilts
            audioframework/out/prebuilts
            ${{ github.workspace }}/.cache/prebuilts
          key: prebuild-cache-${{ runner.os }}-${{ env.BASE_REF }}-${{ env.CACHE_DATE }}
          restore-keys: |
            prebuild-cache-${{ runner.os }}-${{ env.BASE_REF }}-

      - name: Run standalone build or cache refresh
        run: |
          cd audioframework

          if [ -z "$BUILD_COMMAND" ]; then
            echo "::error::Input build_command is empty. Please provide a valid standalone build command when dispatching this workflow."
            exit 1
          fi

          if [ "$RUN_MODE" = "refresh-cache" ]; then
            echo "Refresh-cache mode: run prebuild only, do not restore historical cache."
            bash -lc 'bash build/prebuilts_config.sh'
          else
            echo "Build mode command: $BUILD_COMMAND"
            bash -lc "$BUILD_COMMAND"
          fi

      - name: Save prebuild cache (refresh-cache mode only)
        if: ${{ env.RUN_MODE == 'refresh-cache' }}
        uses: actions/cache/save@v4
        with:
          path: |
            audioframework/prebuilts
            audioframework/out/prebuilts
            ${{ github.workspace }}/.cache/prebuilts
          key: prebuild-cache-${{ runner.os }}-${{ env.BASE_REF }}-${{ env.CACHE_DATE }}

      - name: Upload build logs on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: audioframework-worktree
          path: audioframework
          if-no-files-found: ignore
