name: OpenHarmony AudioFramework Standalone Verify

on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: "Run mode: normal build or cache-only refresh"
        required: true
        type: choice
        default: build
        options:
          - build
          - refresh-cache
      manifest_repo:
        description: "Manifest git repo URL (used by repo init)"
        required: true
        default: "https://gitcode.com/openharmony/manifest.git"
      base_ref:
        description: "Base branch/tag/commit to start from"
        required: true
        default: "master"
      pr_commit:
        description: "PR commit SHA to validate (optional, build mode only)"
        required: false
        default: ""
      pr_fetch_spec:
        description: "PR fetch spec (optional, e.g. '<repo_url> +refs/merge-requests/14808/head:pr_14808')"
        required: false
        default: ""
      build_command:
        description: "Standalone build command"
        required: true
        default: "bash build/prebuilts_config.sh && hb build audio_framework -i"
      ut_build_command:
        description: "UT standalone compile command (executed once with -t in build mode)"
        required: true
        default: "hb build audio_framework -t"
  schedule:
    - cron: "20 18 * * *" # 02:20 UTC+8 daily

jobs:
  standalone-build:
    runs-on: ubuntu-22.04
    env:
      RUN_MODE: ${{ github.event_name == 'schedule' && 'refresh-cache' || github.event.inputs.run_mode || 'build' }}
      MANIFEST_REPO: ${{ github.event.inputs.manifest_repo || 'https://gitcode.com/openharmony/manifest.git' }}
      BASE_REF: ${{ github.event.inputs.base_ref || 'master' }}
      PR_COMMIT: ${{ github.event.inputs.pr_commit || '' }}
      PR_FETCH_SPEC: ${{ github.event.inputs.pr_fetch_spec || '' }}
      BUILD_COMMAND: ${{ github.event.inputs.build_command || 'bash build/prebuilts_config.sh && hb build audio_framework -i' }}
      UT_BUILD_COMMAND: ${{ github.event.inputs.ut_build_command || 'hb build audio_framework -t' }}
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 10G

    steps:
      - name: Checkout workflow repository
        uses: actions/checkout@v4

      - name: Resolve cache key suffix
        run: |
          echo "CACHE_DATE=$(date -u +%Y%m%d)" >> "$GITHUB_ENV"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git python3 python3-pip cmake ninja-build ccache

      - name: Prepare repo tool
        run: |
          curl -L https://storage.googleapis.com/git-repo-downloads/repo -o repo
          chmod +x repo
          echo "${{ github.workspace }}" >> "$GITHUB_PATH"

      - name: Repo init & sync build + audioframework
        run: |
          repo init -u "$MANIFEST_REPO" -b "$BASE_REF" --no-repo-verify
          repo sync -c build multimedia_audio_framework
          echo "Synced repositories with manifest: $MANIFEST_REPO @ $BASE_REF"

      - name: Apply PR fetch spec (if provided)
        if: ${{ env.RUN_MODE == 'build' && env.PR_FETCH_SPEC != '' }}
        run: |
          cd foundation/multimedia/audio_framework
          git fetch --all --tags

          REPO_URL="$(echo "$PR_FETCH_SPEC" | awk '{print $1}')"
          REFSPEC="$(echo "$PR_FETCH_SPEC" | awk '{print $2}')"

          if [ -z "$REPO_URL" ] || [ -z "$REFSPEC" ]; then
            echo "::error::Invalid pr_fetch_spec. Expected format: <repo_url> <refspec>"
            echo "::error::Example: https://gitcode.com/openharmony/multimedia_audio_framework.git +refs/merge-requests/14808/head:pr_14808"
            exit 1
          fi

          git fetch "$REPO_URL" "$REFSPEC"

          TARGET_REF="${REFSPEC#*:}"
          if [ "$TARGET_REF" != "$REFSPEC" ] && [ -n "$TARGET_REF" ]; then
            git checkout "$TARGET_REF"
          else
            git checkout FETCH_HEAD
          fi

          echo "Applied PR fetch spec: $PR_FETCH_SPEC"
          echo "Current HEAD: $(git rev-parse HEAD)"

      - name: Apply PR commit (if provided and no fetch spec)
        if: ${{ env.RUN_MODE == 'build' && env.PR_FETCH_SPEC == '' && env.PR_COMMIT != '' }}
        run: |
          cd foundation/multimedia/audio_framework
          git fetch --all --tags
          git cherry-pick "$PR_COMMIT"
          echo "Applied PR commit: $(git rev-parse HEAD)"

      - name: Prepare standalone build tools
        run: |
          python3 -m pip install --user ./build/hb
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"


      - name: Normalize raw.gitcode openharmony sources to GitHub
        run: |
          python3 - <<'PY2'
          import json
          from pathlib import Path

          cfg_dir = Path('build/indep_configs/config')
          cfg_files = sorted(cfg_dir.glob('*.json'))

          def normalize(url: str) -> str:
              prefix = 'https://raw.gitcode.com/openharmony/'
              if not url.startswith(prefix):
                  return url

              # https://raw.gitcode.com/openharmony/<repo>/raw/<branch>/<path>
              tail = url[len(prefix):]
              parts = tail.split('/', 3)
              if len(parts) != 4:
                  return url

              repo, raw_marker, branch, path = parts
              if raw_marker != 'raw' or not repo or not branch or not path:
                  return url

              return f'https://raw.githubusercontent.com/openharmony/{repo}/{branch}/{path}'

          def walk(obj):
              if isinstance(obj, dict):
                  return {k: walk(v) for k, v in obj.items()}
              if isinstance(obj, list):
                  return [walk(v) for v in obj]
              if isinstance(obj, str):
                  return normalize(obj)
              return obj

          updated_count = 0
          for cfg in cfg_files:
              data = json.loads(cfg.read_text())
              updated = walk(data)
              if updated != data:
                  cfg.write_text(json.dumps(updated, ensure_ascii=False, indent=2) + '\n')
                  updated_count += 1
                  print(f'Normalized raw.gitcode URLs in: {cfg}')

          print(f'Config files scanned: {len(cfg_files)}, updated: {updated_count}')
          PY2

      - name: Restore prebuild cache (build mode only)
        if: ${{ env.RUN_MODE == 'build' }}
        uses: actions/cache/restore@v4
        with:
          path: |
            prebuilts
            out/prebuilts
            ${{ github.workspace }}/.cache/prebuilts
          key: prebuild-cache-${{ runner.os }}-${{ env.BASE_REF }}-${{ env.CACHE_DATE }}
          restore-keys: |
            prebuild-cache-${{ runner.os }}-${{ env.BASE_REF }}-

      - name: Restore ccache (build mode only)
        if: ${{ env.RUN_MODE == 'build' }}
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ runner.os }}-${{ env.BASE_REF }}-${{ env.CACHE_DATE }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ env.BASE_REF }}-

      - name: Initialize ccache
        run: |
          mkdir -p "$CCACHE_DIR"
          ccache --set-config=max_size="$CCACHE_MAXSIZE"
          ccache --show-config | grep -E 'cache_dir|max_size'
          ccache -z

      - name: Run standalone build or cache refresh
        run: |
          if [ -z "$BUILD_COMMAND" ]; then
            echo "::error::Input build_command is empty. Please provide a valid standalone build command when dispatching this workflow."
            exit 1
          fi

          if [ "$RUN_MODE" = "refresh-cache" ]; then
            echo "Refresh-cache mode: run full build to refresh prebuild + ccache from scratch."
            bash -lc "$BUILD_COMMAND"
          else
            echo "Build mode command: $BUILD_COMMAND"
            bash -lc "$BUILD_COMMAND"
          fi

      - name: Run standalone UT compile once (-t, build mode only)
        if: ${{ env.RUN_MODE == 'build' }}
        run: |
          if [ -z "$UT_BUILD_COMMAND" ]; then
            echo "::error::Input ut_build_command is empty. Please provide a valid UT compile command."
            exit 1
          fi

          echo "UT compile command: $UT_BUILD_COMMAND"
          bash -lc "$UT_BUILD_COMMAND"

      - name: Show ccache stats
        if: ${{ always() }}
        run: |
          ccache -s || true

      - name: Save prebuild cache (refresh-cache mode only)
        if: ${{ env.RUN_MODE == 'refresh-cache' }}
        uses: actions/cache/save@v4
        with:
          path: |
            prebuilts
            out/prebuilts
            ${{ github.workspace }}/.cache/prebuilts
          key: prebuild-cache-${{ runner.os }}-${{ env.BASE_REF }}-${{ env.CACHE_DATE }}

      - name: Save ccache (refresh-cache mode only)
        if: ${{ env.RUN_MODE == 'refresh-cache' }}
        uses: actions/cache/save@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ runner.os }}-${{ env.BASE_REF }}-${{ env.CACHE_DATE }}

      - name: Upload standalone build artifacts (build mode only)
        if: ${{ env.RUN_MODE == 'build' }}
        uses: actions/upload-artifact@v4
        with:
          name: audioframework-build-${{ env.BASE_REF }}-${{ github.run_id }}
          path: |
            out/**
          if-no-files-found: warn
          retention-days: 7
